name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binaries
        run: |
          # Build for multiple platforms
          GOOS=linux GOARCH=amd64 go build -o prepare-commit-msg-linux-amd64
          GOOS=linux GOARCH=arm64 go build -o prepare-commit-msg-linux-arm64
          GOOS=darwin GOARCH=amd64 go build -o prepare-commit-msg-darwin-amd64
          GOOS=darwin GOARCH=arm64 go build -o prepare-commit-msg-darwin-arm64
          GOOS=windows GOARCH=amd64 go build -o prepare-commit-msg-windows-amd64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            prepare-commit-msg-linux-amd64
            prepare-commit-msg-linux-arm64
            prepare-commit-msg-darwin-amd64
            prepare-commit-msg-darwin-arm64
            prepare-commit-msg-windows-amd64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
